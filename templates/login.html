<!DOCTYPE html>
<html lang="pt-br" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./static/css/login.css">
    <link rel="stylesheet" href="./static/css/switch.css">
    <title>App Treino-premium - Login</title>
</head>

<body>

    <div class="login-container">

        <div class="login-visual">
            <img src="./static/img/login.jpeg" alt="Login-Image">
            <div class="visual-footer">
                <!-- <p> Use o app também no seu celular</p> -->
            </div>
        </div>

        <div class="login-form-section">
            <!-- Switch de Tema -->
            <div style="position: absolute; top: 20px; right: 30px; z-index: 10;">
                <div class="theme-switch-wrapper">
                    <label class="theme-switch" for="checkbox">
                        <input type="checkbox" id="checkbox" onclick="toggleTheme()" />
                        <div class="slider">
                            <span class="icon-sun">☀️</span>
                            <span class="icon-moon">🌙</span>
                        </div>
                    </label>
                </div>
            </div>

            <div class="form-wrapper">
                <div class="logo">
                    <img src="./static/img/raio.png" alt="Logo">
                    <h2>Aluno</h2>
                </div>

                <form id="login-form">
                    <input type="email" name="email" placeholder="E-mail" id="username" required>

                    <div class="password-group">
                        <input type="password" name="password" placeholder="Senha" id="password" required>
                    </div>

                    <a href="#" class="forgot-password">Esqueceu a senha? Clique aqui</a>

                    <button type="submit" class="btn-primary">Entrar</button>
                    <button type="button" class="btn-secondary">Cadastrar</button>
                </form>

                <p class="terms">Termos de Uso</p>
            </div>
        </div>

    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement; // Pega a tag <html>
            const currentTheme = html.getAttribute('data-theme');

            // Se estiver claro, vira escuro. Se estiver escuro, vira claro.
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';

            html.setAttribute('data-theme', newTheme);

            // Salva a escolha para quando você der F5
            localStorage.setItem('theme', newTheme);

            console.log("Tema alterado para: " + newTheme);
        }

        // Aplica o tema salvo ao abrir o site
        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        });

        // Função auxiliar para fazer solicitações autenticadas
        async function authFetch(url, options = {}) {
            const token = localStorage.getItem('access_token');
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };

            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }

            return fetch(url, {
                ...options,
                headers
            });
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/logar', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username: email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('access_token', data.access_token);
                    // Testa se o token é válido antes de redirecionar
                    const testResponse = await authFetch('/index');
                    if (testResponse.ok) {
                        window.location.href = '/index';
                    } else {
                        alert('Token inválido');
                    }
                } else {
                    alert(data.msg);
                }
            } catch (error) {
                alert('Erro ao conectar ao servidor');
                console.error(error);
            }
        });
    </script>
</body>

</html>
