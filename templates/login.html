<!DOCTYPE html>
<html lang="pt-br" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./static/css/login.css">
    <link rel="stylesheet" href="./static/css/switch.css">
    <style>
        .tab-btn {
            background: none;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            color: #999;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active {
            color: #00d4ff;
            border-bottom-color: #00d4ff;
        }

        .tab-btn:hover {
            color: #00d4ff;
        }

        html[data-theme="dark"] .tab-btn {
            color: #666;
        }

        html[data-theme="dark"] .tab-btn.active {
            color: #00d4ff;
            border-bottom-color: #00d4ff;
        }

        html[data-theme="dark"] .form-wrapper {
            border-color: #444;
        }
    </style>
</head>

<body>

    <div class="login-container">

        <div class="login-visual">
            <img src="./static/img/login.jpeg" alt="Login-Image">
            <div class="visual-footer">
                <!-- <p> Use o app também no seu celular</p> -->
            </div>
        </div>

        <div class="login-form-section">
            <!-- Switch de Tema -->
            <div style="position: absolute; top: 20px; right: 30px; z-index: 10;">
                <div class="theme-switch-wrapper">
                    <label class="theme-switch" for="checkbox">
                        <input type="checkbox" id="checkbox" onclick="toggleTheme()" />
                        <div class="slider">
                            <span class="icon-sun">☀️</span>
                            <span class="icon-moon">🌙</span>
                        </div>
                    </label>
                </div>
            </div>

            <div class="form-wrapper">
                <div class="logo">
                    <img src="./static/img/raio.png" alt="Logo">
                    <h2 id="formTitle">Aluno</h2>
                </div>

                <!-- Abas de seleção -->
                <div style="display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 2px solid #e0e0e0;">
                    <button type="button" class="tab-btn active" data-tab="aluno" onclick="switchTab('aluno')">
                        👤 Aluno
                    </button>
                    <button type="button" class="tab-btn" data-tab="personal" onclick="switchTab('personal')">
                        🏋️ Personal
                    </button>
                </div>

                <form id="login-form">
                    <input type="email" name="email" placeholder="E-mail" id="username" required>

                    <div class="password-group">
                        <input type="password" name="password" placeholder="Senha" id="password" required>
                    </div>

                    <a href="#" class="forgot-password">Esqueceu a senha? Clique aqui</a>

                    <button type="submit" class="btn-primary">Entrar</button>
                    <button type="button" class="btn-secondary">Cadastrar</button>
                </form>

                <p class="terms">Termos de Uso</p>
            </div>
        </div>

    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';

            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);

            console.log("Tema alterado para: " + newTheme);
        }

        // Aplica o tema salvo ao abrir o site
        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        });

        // Função auxiliar para fazer solicitações autenticadas
        async function authFetch(url, options = {}) {
            const token = localStorage.getItem('access_token');
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };

            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }

            return fetch(url, {
                ...options,
                headers
            });
        }

        function switchTab(tab) {
            // Atualizar botões ativos
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');

            // Atualizar título
            const title = document.getElementById('formTitle');
            if (tab === 'personal') {
                title.textContent = 'Personal';
            } else {
                title.textContent = 'Aluno';
            }
            // Limpar campos
            document.getElementById('login-form').reset();
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const userType = document.querySelector('.tab-btn.active').getAttribute('data-tab');

            try {
                const response = await fetch('/logar', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username: email, password, user_type: userType })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('user_type', data.user_type);

                    // Se for personal, ir para o painel de personalização
                    if (data.user_type === 'personal') {
                        window.location.href = '/personal';
                    } else {
                        // Se for aluno, ir para o index normal
                        window.location.href = '/index';
                    }
                } else {
                    alert(data.msg);
                }
            } catch (error) {
                alert('Erro ao conectar ao servidor');
                console.error(error);
            }
        });
    </script>
</body>

</html>
