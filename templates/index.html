{% extends "base.html" %}

{% block title %}App Treino - Premium{% endblock %}

{% block protection_script %}
<script>
    // Proteção de rota: Verifica se o usuário está logado antes de carregar a página
    if (!localStorage.getItem('access_token')) {
        window.location.href = '/';
    }
</script>
{% endblock %}

{% block content %}

<header class="main-header">


    <div class="header-content">
        <h1 id="welcome-message">Olá, <span id="student-name">Kevin</span>!</h1>
    </div>

    <div class="personal-silhouette">
        <img id="img-personal" src="{{ url_for('static', filename='img/59d6288f3752880e93e16ea2.png') }}"
            alt="Personal Trainer">
    </div>
</header>



<div id="calendar" class="calendar-horizontal"></div>

<main class="grid-container">
    <button class="card" onclick="window.location.href='{{ url_for('treinos') }}'">
        <div class="icon-red">
            <img src="{{ url_for('static', filename='img/treino.png') }}" alt="Ícone Treinos">
        </div>
        <span>Treinos</span>
    </button>

    <button class="card" onclick="window.location.href='{{ url_for('cardio') }}'">
        <div class="icon-red">
            <img src="{{ url_for('static', filename='img/cardio.svg') }}" alt="Ícone Cardio">
        </div>
        <span>Cardio</span>
    </button>

    <button class="card" onclick="window.location.href='{{ url_for('avaliacoes') }}'">
        <div class="icon-red">
            <img src="{{ url_for('static', filename='img/avaliação.svg') }}" alt="Ícone Avaliações">
        </div>
        <span>Avaliações</span>
    </button>

    <button class="card" onclick="window.location.href='{{ url_for('dieta') }}'">
        <div class="icon-red">
            <img src="{{ url_for('static', filename='img/dieta.png') }}" alt="Ícone Dieta">
        </div>
        <span>Dieta</span>
    </button>

    <button class="card" onclick="window.location.href='{{ url_for('arquivos') }}'">
        <div class="icon-red">
            <img src="{{ url_for('static', filename='img/arquivos.svg') }}" alt="Ícone Arquivos">
        </div>
        <span>Arquivos</span>
    </button>

    <button class="card" onclick="window.location.href='{{ url_for('fatura') }}'">
        <div class="icon-red">
            <img src="{{ url_for('static', filename='img/fatura.svg') }}" alt="Ícone Fatura">
        </div>
        <span>Fatura</span>
    </button>
</main>
<div class="circular-menu" id="circularMenu">
    <button class="floating-btn" onclick="toggleMenu()">
        <span id="menuIcon">+</span>
    </button>

    <menu class="items-wrapper">
        <a href="/treinos" class="menu-item"><img src="../static/img/treino.png"></a>
        <a href="/dieta" class="menu-item"><img src="../static/img/dieta.png"></a>
        <a href="/cardio" class="menu-item"><img src="../static/img/cardio.svg"></a>
        <a href="/avaliacoes" class="menu-item"><img src="../static/img/avaliação.svg"></a>
        <a href="/arquivos" class="menu-item"><img src="../static/img/arquivos.svg"></a>
        <a href="/fatura" class="menu-item"><img src="../static/img/fatura.svg"></a>

        {% endblock %}

        {% block extra_js %}
        <script src="{{ url_for('static', filename='js/calendar.js') }}"></script>

        <script>
            // Função auxiliar para requisições autenticadas (caso precise usar no futuro)
            async function authFetch(url, options = {}) {
                const token = localStorage.getItem('access_token');
                const headers = {
                    'Content-Type': 'application/json',
                    ...options.headers
                };

                if (token) {
                    headers['Authorization'] = `Bearer ${token}`;
                }

                return fetch(url, {
                    ...options,
                    headers
                });
            }

            // Funcionalidade de Logout
            document.getElementById('logout-btn').addEventListener('click', () => {
                localStorage.removeItem('access_token');
                window.location.href = '/';
            });
        </script>
        {% endblock %}
