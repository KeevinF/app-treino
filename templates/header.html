<!-- Nav com o switch de tema e personalização -->
<nav class="top-nav">
    <div class="nav-container">
        <span class="team-name" id="personal-name">
            Team&nbsp;<span id="personal-actual-name">Rocksteer</span>
        </span>

        <div class="nav-controls">
            <div class="theme-switch-wrapper">
                <label class="theme-switch" for="checkbox">
                    <input type="checkbox" id="checkbox" onclick="toggleTheme()" />
                    <div class="slider">
                        <span class="icon-sun">☀️</span>
                        <span class="icon-moon">🌙</span>
                    </div>
                </label>
            </div>

            <button type="button" id="logout-btn" class="btn-logout">Sair</button>
        </div>
    </div>
</nav>

<script>
    // Carregar e aplicar personalização do personal ao abrir a página
    async function applyPersonalization() {
        try {
            const response = await fetch('/api/personalization');
            const allPersonalization = await response.json();

            // Tentar encontrar dados salvos localmente
            const localData = localStorage.getItem('personalData');
            if (localData) {
                const personalization = JSON.parse(localData);

                // Aplicar nome do personal
                if (personalization.personalName) {
                    document.getElementById('personal-actual-name').textContent = personalization.personalName;
                }

                // Aplicar nome do aluno (se houver)
                if (personalization.studentName) {
                    const studentName = document.getElementById('student-name');
                    if (studentName) {
                        studentName.textContent = personalization.studentName;
                    }
                }

                // Aplicar foto do personal
                if (personalization.photoData) {
                    const personalImg = document.getElementById('img-personal');
                    if (personalImg) {
                        personalImg.src = personalization.photoData;
                    }
                }

                // Aplicar cores personalizadas
                if (personalization.primaryColor || personalization.secondaryColor) {
                    const primary = personalization.primaryColor || '#00d4ff';
                    const secondary = personalization.secondaryColor || '#0099cc';

                    const style = document.getElementById('personalizedStyles');
                    style.innerHTML = `
                        :root {
                            --primary-color: ${primary};
                            --secondary-color: ${secondary};
                        }
                        
                        .top-nav {
                            background: linear-gradient(135deg, ${primary} 0%, ${secondary} 100%);
                        }
                        
                        .slider {
                            background-color: ${primary} !important;
                        }
                        
                        input:focus {
                            border-color: ${primary} !important;
                        }
                        
                        .btn-logout:hover {
                            background-color: rgba(255, 255, 255, 0.1);
                        }
                    `;
                }
            }

            // Se for personal, mostrar botão de painel
            const isPersonal = localStorage.getItem('user_type') === 'personal';
            if (isPersonal) {
                const logoutBtn = document.getElementById('logout-btn');
                if (logoutBtn) {
                    // Inserir botão de painel antes do botão de logout
                    const panelBtn = document.createElement('button');
                    panelBtn.type = 'button';
                    panelBtn.className = 'btn-logout';
                    panelBtn.textContent = '⚙️ Painel';
                    panelBtn.style.marginRight = '10px';
                    panelBtn.onclick = () => {
                        window.location.href = '/personal';
                    };
                    logoutBtn.parentElement.insertBefore(panelBtn, logoutBtn);
                }
            }
        } catch (error) {
            console.log('Personalization não disponível ou erro ao carregar');
        }
    }

    // Executar quando o DOM estiver pronto
    document.addEventListener('DOMContentLoaded', applyPersonalization);
</script>
