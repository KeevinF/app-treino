<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Treino - Premium</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/switch.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/footer.css">
</head>

<body>

    <div class="theme-switch-wrapper">
        <label class="theme-switch">
            <input type="checkbox" id="checkbox" onclick="toggleTheme()">
            <div class="slider">
                <span class="icon-sun">☀️</span>
                <span class="icon-moon">🌙</span>
            </div>
        </label>
    </div>

    <div id="test-panel">
        <div class="panel-group">
            <input type="file" id="upload-foto" accept="image/*">
            <button onclick="testarNomes()">Atualizar Foto</button>
        </div>

        <div class="panel-group">
            <input type="text" id="input-aluno" placeholder="Nome do Aluno">
            <input type="text" id="input-personal" placeholder="Nome do Personal">
            <button onclick="testarNomes()">Atualizar Nomes</button>
        </div>
    </div>

    <header class="main-header">
        <div class="header-content">
            <span class="team-name" id="personal-name">
                Team&nbsp;<span id="personal-actual-name">Rocksteer</span>
            </span>
            <h1 id="welcome-message">Olá, <span id="student-name"> Kevin</span>!</h1>
        </div>

        <div class="personal-silhouette">
            <img id="img-personal" src="./img/silhueta-exemplo.png" alt="Personal Trainer">
        </div>
    </header>

    <div id="calendar" class="calendar-horizontal"></div>

    <main class="grid-container">
        <div class="card">
            <div class="icon-red"><img src="./img/dubell.svg" alt="icon"></div>
            <span>Treinos</span>
        </div>
        <div class="card">
            <div class="icon-red"><img src="./img/cardio.svg" alt="icon"></div>
            <span>Cardio</span>
        </div>
        <div class="card">
            <div class="icon-red"><img src="./img/avaliação.svg" alt="icon"></div>
            <span>Avaliações</span>
        </div>
        <div class="card">
            <div class="icon-red"><img src="./img/dieta.svg" alt="icon"></div>
            <span>Dieta</span>
        </div>
        <div class="card">
            <div class="icon-red"><img src="./img/arquivos.svg" alt="icon"></div>
            <span>Arquivos</span>
        </div>
        <div class="card">
            <div class="icon-red"><img src="./img/faturas.svg" alt="icon"></div>
            <span>Fatura</span>
        </div>
    </main>

    <footer class="bottom-nav">
        <div class="nav-item active">
            <div class="nav-icon"><img src="./img/home.svg" alt="Início"></div>
            <span>Início</span>
        </div>
        <div class="nav-item">
            <div class="nav-icon"><img src="./img/instagram.svg" alt="Instagram"></div>
            <span>Instagram</span>
        </div>
        <div class="nav-item">
            <div class="nav-icon"><img src="./img/whatsapp.svg" alt="WhatsApp"></div>
            <span>WhatsApp</span>
        </div>
        <div class="nav-item">
            <div class="nav-icon"><img src="./img/menu.svg" alt="Menu"></div>
            <span>Menu</span>
        </div>
    </footer>

    <script src="./js/calendar.js"></script>
    <script src="./js/main.js"></script>
</body>

</html>
